  <script type="application/ld+json">{"@context": "https://schema.org", "@type": "Book", "name": "Nijmeegs Luiletterland", "author": {"@type": "Person", "name": "Wim Huijser"}, "publisher": {"@type": "Organization", "name": "ABC Uitgeverij"}, "isbn": "9789492411570", "datePublished": "2023", "inLanguage": "nl", "description": "Wandelen door Nijmeegs Luiletterland Al heel wat jaren spreken in Nijmegen de Letteren. De stad aan de Waal bruist van de literaire festivals, initiatieven en activiteiten. De afgelopen tijd geldt dat meer dan ooit met de verschijning van de Nijmeegse stadsromans van A.F.Th. van der Heijden, Thomas Verbogt, Jaap Robben en Tessa de Loo, waarmee de gemeente Nijmegen de historie en identiteit van de stad een plaats in de literatuur wil geven. In de wandelgids Nijmeegs Luiletterland verbindt schrijver-wandelaar Wim Huijser de Nijmeegse literaire geschiedenis met bestaande plekken in de stad die een rol spelen in boeken en gedichten. Samen met routemaker Rob Wolfs ontwierp hij wandelroutes door Nijmegen en omgeving langs 27 locaties die verwijzen naar het werk van bekende, maar deels ook vergeten, Nijmeegse auteurs – en auteurs die óver Nijmegen hebben geschreven. De verbinding tussen wandelen en literaire beleving biedt de lezer-wandelaar de mogelijkheid de stad in een ander licht te zien. Zo laat Wam de Moor op de Grote Markt Mariken tot ons spreken en voert Nescio ons langs de Waal naar de oude spoorbrug. We volgen met Steffie van den Oord het spoor van oude liefdesbrieven, ontdekken het Valkhofpark van Yana van Tienen en genieten van de vergezichten die Marijke Hanegraaf ons biedt. Lopend vanaf de Krayenhoffkazerne, maken we bij de Sint Annastraat kennis met wandelpropagandist Jan Feith. Koos van Zomeren brengt ons bij het pand waar begin jaren zeventig het hoofdkantoor van de Socialistiese Partij gevestigd was. We betreden de geboortegrond van Erik van Godfried Bomans en komen langs het Literaire Baken van de literaire duizendpoot Pé Hawinkels, om vervolgens aan de hand van eeuwenoude dichters richting Beek te struinen en uit te kijken over de Elyzeese Velden. Nijmeegs Luiletterland neemt je mee op een tocht door de Nijmeegse literatuur. Het is daarmee een ideale roadmap voor Nijmegenaren en niet-Nijmegenaren die het literaire landschap van de stad ook met eigen ogen willen aanschouwen. Wim Huijser (Ridderkerk, 1960) is schrijver-publicist op het snijvlak van geschiedenis, literatuur en landschap. Hij woont sinds 2014 in Wageningen. Wandelen is voor hem de meest voor de hand liggende manier om zijn onderwerpen te verkennen. Huijser is schrijver en samensteller van ruim tachtig titels en daarbij biograaf van schrijver-dichter C. Buddingh’, over wie hij naast de biografie Dichter bij Dordt (2015) ook de literaire wandelgids ‘Dordt, wat zal ik ervan zeggen’ (2008) maakte. Andere wandelboeken van zijn hand zijn o.a.: Voetsporen. Op schrijverspad door het land van de grote rivieren (2014), Wandelboekje van natuurvrienden (2016), Levenspaden. Over wandelen en onderweg zijn (samen met Marinus van den Berg, 2016), De kracht van wandelen (2019), Veluwse verkenningen (2020), Pelgrimeren in de polder (2021) en Arnhems Luiletterland (2021). Samen met routemaker Rob Wolfs schreef hij de wandelgidsen Wandelen in de geest van Jac. P. Thijsse (2017), Weldadig wandelen (2019) en De mooiste kasteelwandelingen in Gelderland (2021). Ook stelde hij recent een tweetal wandelbloemlezingen samen: Had je nog willen wandelen? Mieterse wandelingen met Maarten Koning (2021) met wandelfragmenten van J.J. Voskuil en Hier loop ik dan. Het mooiste uit de Nederlandse wandelliteratuur. In 2022 debuteerde Huijser met fictie: Aan de wandel (2022), gevolgd door Op Pieterpad (2023). Later dit jaar verschijnt ook Het Genootschap. Een modern feuilleton.", "offers": {"@type": "Offer", "price": "14.95", "priceCurrency": "EUR", "availability": "https://schema.org/InStock", "url": "https://www.roelants.nl/nl/boeken-page/9789492411570/boek"}, "numb
