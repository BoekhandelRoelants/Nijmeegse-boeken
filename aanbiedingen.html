<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aanbiedingen – Boeken over Nijmegen</title>
  <meta name="description" content="Voordelig boeken over Nijmegen kopen. Bekijk onze actuele aanbiedingen en afgeprijsde titels over Nijmeegse geschiedenis, architectuur en meer.">
  <link rel="canonical" href="https://nijmeegseboeken.nl/aanbiedingen.html">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preload" href="nijmegen.js" as="script">
  <link rel="preconnect" href="https://wscovers1.tlsecure.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="nijmegen.css">
</head>
<body>
<div id="nbHeader"></div>
<main>
  <div class="nb-pagina nb-pagina-sub">
    <aside class="nb-sidebar">
      <div class="nb-sidebar-blok">
        <h3>Nieuwste boeken</h3>
        <div id="nbSidebarNieuwste"></div>
      </div>
      <div class="nb-sidebar-blok">
        <h3>Categorieën</h3>
        <ul id="nbSidebarCats"></ul>
      </div>
    </aside>
    <div class="nb-hoofd">
      <nav class="nb-breadcrumb" aria-label="Kruimelpad">
        <a href="index.html">Nijmeegse Boeken</a> › <span>Aanbiedingen</span>
      </nav>
      <div class="nb-paginakop">
        <h1>Aanbiedingen</h1>
        <p id="paginaOndertitel">Afgeprijsde titels over Nijmegen en de regio</p>
      </div>
      <div id="nbSorteerBalk"></div>
      <div class="nb-grid" id="gridAanbiedingen"><p class="nb-leeg">Laden…</p></div>
      <div id="nbPaginering"></div>
    </div>
  </div>
</main>
<div id="nbFooter"></div>
<script src="nijmegen.js"></script>
<script>
(async () => {
  const boeken = await nbLaadBoeken();
  await nbLaadInstellingen();
  const cats = [...new Set(boeken.flatMap(b => (b.categorieën||b.categorie ? (Array.isArray(b.categorieën||b.categorie) ? (b.categorieën||b.categorie) : [b.categorieën||b.categorie]) : [])))].sort().map(s => ({naam: s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' '), slug: s}));
  document.getElementById('nbHeader').innerHTML = nbHeaderHTML('aanbiedingen.html', cats);
  document.getElementById('nbFooter').innerHTML = nbFooterHTML(cats);
  nbVulSidebar(boeken, null);
  const aanbiBoeken = boeken.filter(b => b.aanbieding);
  document.getElementById('paginaOndertitel').textContent = nbTekst('aanbiedingen_intro','Boeken met een speciale prijs') || aanbiBoeken.length + ' titel' + (aanbiBoeken.length !== 1 ? 's' : '') + ' in de aanbieding';
  document.getElementById('nbSorteerBalk').innerHTML = nbSorteerBalk('id-desc');
  window.nbHerrendeer = function(methode) {
    const gesorteerd = nbSorteer(aanbiBoeken, methode);
    window._nbPaginaBoeken = gesorteerd;
    nbPaginering(gesorteerd, document.getElementById('nbPaginering'), document.getElementById('gridAanbiedingen'), 1);
  }
  window.nbGaNaarPagina = function(nr) {
    nbPaginering(window._nbPaginaBoeken, document.getElementById('nbPaginering'), document.getElementById('gridAanbiedingen'), nr);
    window.scrollTo({ top: document.getElementById('gridAanbiedingen').offsetTop - 80, behavior: 'smooth' });
  };
  nbHerrendeer('id-desc');
})();
</script>
</body>
</html>
