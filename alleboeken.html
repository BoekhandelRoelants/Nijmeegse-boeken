<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alle boeken over Nijmegen – Nijmeegse Boeken</title>
  <meta name="description" content="Alle boeken over Nijmegen en de regio. Het meest complete overzicht van titels over geschiedenis, architectuur, natuur en meer.">
  <link rel="canonical" href="https://nijmeegseboeken.nl/alleboeken.html">
  <meta property="og:title" content="Alle boeken over Nijmegen – Nijmeegse Boeken">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="nl_NL">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preload" href="nijmegen.js" as="script">
  <link rel="preconnect" href="https://wscovers1.tlsecure.com">
  <link rel="stylesheet" href="nijmegen.css">
</head>
<body>
<div id="nbHeader"></div>
<main>
  <div class="nb-pagina nb-pagina-sub">
    <div class="nb-hoofd">
      <nav class="nb-breadcrumb" aria-label="Kruimelpad">
        <a href="index.html">Nijmeegse Boeken</a> › <span>Alle boeken</span>
      </nav>
      <div class="nb-paginakop">
        <h1>Alle boeken over Nijmegen</h1>
        <p id="paginaOndertitel"></p>
      </div>
      <div id="nbSorteerBalk"></div>
      <div class="nb-grid" id="gridAlle"><p class="nb-leeg">Laden…</p></div>
      <div id="nbPaginering"></div>
      <div class="nb-seo" id="nbSeoBlok"></div>
    </div>
    <aside class="nb-sidebar">
      <div class="nb-sidebar-blok">
        <h3>Nieuwste boeken</h3>
        <div id="nbSidebarNieuwste"></div>
      </div>
      <div class="nb-sidebar-blok">
        <h3>Categorieën</h3>
        <ul id="nbSidebarCats"></ul>
      </div>
    </aside>
  </div>
</main>
<div id="nbFooter"></div>
<script src="nijmegen.js"></script>
<script>
(async () => {
  const boeken = await nbLaadBoeken();
  await nbLaadInstellingen();
  const cats = [...new Set(boeken.flatMap(b => (b.categorieën||b.categorie ? (Array.isArray(b.categorieën||b.categorie) ? (b.categorieën||b.categorie) : [b.categorieën||b.categorie]) : [])))].sort().map(s => ({naam: s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' '), slug: s}));
  document.getElementById('nbHeader').innerHTML = nbHeaderHTML('alleboeken.html', cats);
  document.getElementById('nbFooter').innerHTML = nbFooterHTML(cats);
  nbVulSidebar(boeken, null);
  document.getElementById('paginaOndertitel').textContent = boeken.length + ' titels over Nijmegen en de regio';
  document.getElementById('nbSorteerBalk').innerHTML = nbSorteerBalk('jaar-desc');
  document.getElementById('nbSeoBlok').innerHTML = '<h2>Het meest complete aanbod boeken over Nijmegen</h2><p>Van stadsgeschiedenis tot fotografie, van architectuur tot natuur — alle boeken over Nijmegen en de regio op één plek.</p>';
  window.nbHerrendeer = function(methode) {
    const gesorteerd = nbSorteer(boeken, methode);
    window._nbPaginaBoeken = gesorteerd;
    nbPaginering(gesorteerd, document.getElementById('nbPaginering'), document.getElementById('gridAlle'), 1);
  };
  window.nbGaNaarPagina = function(nr) {
    nbPaginering(window._nbPaginaBoeken, document.getElementById('nbPaginering'), document.getElementById('gridAlle'), nr);
    window.scrollTo({ top: document.getElementById('gridAlle').offsetTop - 80, behavior: 'smooth' });
  };
  nbHerrendeer('jaar-desc');
  nbFixCoverHoogtes();
  setTimeout(nbFixCoverHoogtes, 300);
})();
</script>
</body>
</html>
