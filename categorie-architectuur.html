<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architectuurboeken over Nijmegen – Nijmeegse Boeken</title>
  <meta name="description" content="Bekijk alle architectuurboeken over Nijmegen en de regio. Bestel direct via Boekhandel Roelants. Gratis verzending vanaf €30,-.">
  <link rel="canonical" href="https://nijmeegseboeken.nl/categorie-architectuur.html">
  <meta property="og:title" content="Architectuurboeken over Nijmegen – Nijmeegse Boeken">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="nl_NL">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[
    {"@type":"ListItem","position":1,"name":"Nijmeegse Boeken","item":"https://nijmeegseboeken.nl/"},
    {"@type":"ListItem","position":2,"name":"Architectuur","item":"https://nijmeegseboeken.nl/categorie-architectuur.html"}
  ]}
  </script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="nijmegen.css">
</head>
<body>
<div id="nbHeader"></div>
<main>
  <div class="nb-pagina nb-pagina-sub">
    <div class="nb-hoofd">
      <nav class="nb-breadcrumb" aria-label="Kruimelpad">
        <a href="index.html">Nijmeegse Boeken</a> &rsaquo; <span>Architectuur</span>
      </nav>
      <div class="nb-paginakop">
        <h1>Boeken over Nijmegen: Architectuur</h1>
        <p id="paginaOndertitel"></p>
      </div>
      <div id="nbSorteerBalk"></div>
      <div class="nb-grid" id="gridCategorie"><p class="nb-leeg">Laden…</p></div>
      <div id="nbPaginering"></div>
      <div class="nb-seo" id="nbSeoBlok"></div>
    </div>
    <aside class="nb-sidebar">
      <div class="nb-sidebar-blok">
        <h3>Nieuwste boeken</h3>
        <div id="nbSidebarNieuwste"></div>
      </div>
      <div class="nb-sidebar-blok">
        <h3>Categorieën</h3>
        <ul id="nbSidebarCats"></ul>
      </div>
    </aside>
  </div>
</main>
<div id="nbFooter"></div>
<script src="nijmegen.js"></script>
<script>
(async () => {
  const boeken = await nbLaadBoeken();
  await nbLaadInstellingen();
  const cats = [...new Set(boeken.flatMap(b => (b.categorieën||b.categorie ? (Array.isArray(b.categorieën||b.categorie) ? (b.categorieën||b.categorie) : [b.categorieën||b.categorie]) : [])))].sort().map(s => ({naam: s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' '), slug: s}));
  document.getElementById('nbHeader').innerHTML = nbHeaderHTML('categorie-architectuur.html', cats);
  document.getElementById('nbFooter').innerHTML = nbFooterHTML(cats);
  nbVulSidebar(boeken, 'architectuur');
  const gefilterd = boeken.filter(b => nbInCategorie(b, 'architectuur'));
  document.getElementById('paginaOndertitel').textContent = gefilterd.length + ' titel' + (gefilterd.length !== 1 ? 's' : '') + ' in deze categorie';
  document.getElementById('nbSorteerBalk').innerHTML = nbSorteerBalk('id-desc');
  window.nbHerrendeer = function(methode) {
    const gesorteerd = nbSorteer(gefilterd, methode);
    window._nbPaginaBoeken = gesorteerd;
    window._nbPaginaHuidig = 1;
    nbPaginering(gesorteerd, document.getElementById('nbPaginering'), document.getElementById('gridCategorie'), 1);
  }
  window.nbGaNaarPagina = function(nr) {
    window._nbPaginaHuidig = nr;
    nbPaginering(window._nbPaginaBoeken, document.getElementById('nbPaginering'), document.getElementById('gridCategorie'), nr);
    window.scrollTo({ top: document.getElementById('gridCategorie').offsetTop - 80, behavior: 'smooth' });
  };
  nbHerrendeer('id-desc');
  const seoTitel = nbTekst('cat_architectuur_titel', 'Architectuur in en rond Nijmegen');
  const seoTekst = nbTekst('cat_architectuur_tekst', 'Ontdek ons aanbod boeken in de categorie architectuur. Alle titels zijn direct te bestellen via Boekhandel Roelants in Nijmegen.');
  const seoTekst2 = nbTekst('cat_architectuur_tekst2', '');
  document.getElementById('nbSeoBlok').innerHTML = '<h2>' + seoTitel + '</h2><p>' + seoTekst + '</p>' + (seoTekst2 ? '<p>' + seoTekst2 + '</p>' : '');
  const itemList = document.createElement('script'); itemList.type = 'application/ld+json';
  itemList.textContent = JSON.stringify({"@context":"https://schema.org","@type":"ItemList","name":"Architectuurboeken over Nijmegen","url":"https://nijmeegseboeken.nl/categorie-architectuur.html","numberOfItems":gefilterd.length,"itemListElement":gefilterd.slice(0,10).map((b,i)=({"@type":"ListItem","position":i+1,"url":"https://nijmeegseboeken.nl/boek.html?id="+b.id,"name":b.titel}))});
  document.head.appendChild(itemList);
  nbFixCoverHoogtes(); setTimeout(nbFixCoverHoogtes, 300);
})();
</script>
</body>
</html>
