<body>
<div id="nbHeader"></div>
<main>
  <div class="nb-pagina">
    <div class="nb-hoofd">
      <div id="nbWelkom"></div>
      <section id="uitgelicht" aria-labelledby="kop-uitgelicht">
        <div class="nb-sectiekop">
          <h2 id="kop-uitgelicht">Uitgelicht</h2>
        </div>
        <div class="nb-grid" id="gridUitgelicht"><p class="nb-leeg">Laden…</p></div>
      </section>
      <section id="nieuw" aria-labelledby="kop-nieuw">
        <div class="nb-sectiekop">
          <h2 id="kop-nieuw">Nieuw verschenen</h2>
          <a href="nieuw.html">Alle nieuwe titels &rarr;</a>
        </div>
        <div class="nb-grid" id="gridNieuw"><p class="nb-leeg">Laden…</p></div>
      </section>
      <section id="aanbiedingen" aria-labelledby="kop-aanbiedingen">
        <div class="nb-sectiekop">
          <h2 id="kop-aanbiedingen">Aanbiedingen</h2>
          <a href="aanbiedingen.html">Alle aanbiedingen &rarr;</a>
        </div>
        <div class="nb-grid" id="gridAanbiedingen"><p class="nb-leeg">Laden…</p></div>
      </section>
      <section id="sectieZoek" style="display:none" aria-labelledby="kop-zoek">
        <div class="nb-sectiekop">
          <h2 id="kop-zoek">Zoekresultaten</h2>
          <a href="index.html">Wis zoekopdracht &times;</a>
        </div>
        <div class="nb-grid" id="gridZoek"></div>
      </section>
      <div class="nb-seo" id="nbSeoBlok"></div>
    </div>
    <aside class="nb-sidebar" aria-label="Categorieën">
      <div class="nb-sidebar-blok">
        <h3>Nieuwste boeken</h3>
        <div id="nbSidebarNieuwste"></div>
      </div>
      <div class="nb-sidebar-blok">
        <h3>Categorieën</h3>
        <ul id="nbSidebarCats"></ul>
      </div>
      <div class="nb-sidebar-blok">
        <h3>Snel naar</h3>
        <ul>
          <li><a href="toptien.html">Top Tien</a></li>
          <li><a href="nieuw.html">Nieuw verschenen</a></li>
          <li><a href="aanbiedingen.html">Aanbiedingen</a></li>
        </ul>
      </div>
    </aside>
  </div>
  </div>
</main>
<div id="nbFooter"></div>
<script src="nijmegen.js"></script>
<script>
(async () => {
  const boeken = await nbLaadBoeken();
  await nbLaadInstellingen();
  const cats = [...new Set(boeken.flatMap(b => (b.categorieën||b.categorie ? (Array.isArray(b.categorieën||b.categorie) ? (b.categorieën||b.categorie) : [b.categorieën||b.categorie]) : [])))].sort().map(s => ({naam: s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' '), slug: s}));
  document.getElementById('nbHeader').innerHTML = nbHeaderHTML('index.html', cats);
  document.getElementById('nbFooter').innerHTML = nbFooterHTML(cats);
  document.getElementById('nbWelkom').innerHTML = nbWelkomHTML();
  nbVulSidebar(boeken, null);

  // Laad instellingen
  let inst = { homepagina: { uitgelicht_max: 0, nieuw_max: 8, aanbiedingen_max: 0 } };
  try {
    const r = await fetch('instellingen.json');
    if (r.ok) inst = await r.json();
  } catch(e) {}
  const hpInst = inst.homepagina || {};
  const uitgelichtMax   = hpInst.uitgelicht_max   || 0;
  const nieuwMax        = hpInst.nieuw_max        || 8;
  const aanbiedingenMax = hpInst.aanbiedingen_max || 0;

  const sorteerHP = (arr) => [...arr].sort((a, b) => (b.jaar||0) - (a.jaar||0) || (b.id||0) - (a.id||0));

  const params = new URLSearchParams(window.location.search);
  const zoekQ = params.get('zoek');
  if (zoekQ) {
    document.getElementById('sectieZoek').style.display = '';
    document.getElementById('uitgelicht').style.display = 'none';
    document.getElementById('nieuw').style.display = 'none';
    document.getElementById('aanbiedingen').style.display = 'none';
    document.getElementById('kop-zoek').textContent = 'Zoekresultaten voor "' + zoekQ + '"';
    if (document.getElementById('nbZoekInput')) document.getElementById('nbZoekInput').value = zoekQ;
    const res = boeken.filter(b => [b.titel, b.auteur, b.beschrijving, ...nbCats(b), ...(b.trefwoorden||[])].some(v => (v||'').toLowerCase().includes(zoekQ.toLowerCase())));
    document.getElementById('gridZoek').innerHTML = res.length ? res.map(b => nbRenderKaart(b)).join('') : '<p class="nb-leeg">Geen resultaten gevonden voor "' + zoekQ + '".</p>';
  } else {
    let uitgelicht = sorteerHP(boeken.filter(b => b.uitgelicht));
    if (uitgelichtMax > 0) uitgelicht = uitgelicht.slice(0, uitgelichtMax);

    let nieuw = nbNieuwBoeken(boeken, nieuwMax > 0 ? nieuwMax : 8);

    let aanbiedingen = sorteerHP(boeken.filter(b => b.aanbieding));
    if (aanbiedingenMax > 0) aanbiedingen = aanbiedingen.slice(0, aanbiedingenMax);

    document.getElementById('gridUitgelicht').innerHTML = uitgelicht.length ? uitgelicht.map(b => nbRenderKaart(b)).join('') : '<p class="nb-leeg">Geen uitgelichte boeken.</p>';
    document.getElementById('gridNieuw').innerHTML = nieuw.length ? nieuw.map(b => nbRenderKaart(b)).join('') : '<p class="nb-leeg">Geen nieuwe titels.</p>';
    document.getElementById('gridAanbiedingen').innerHTML = aanbiedingen.length ? aanbiedingen.map(b => nbRenderKaart(b)).join('') : '<p class="nb-leeg">Momenteel geen aanbiedingen.</p>';
  }
  document.getElementById('nbSeoBlok').innerHTML = '<h2>' + nbTekst('homepagina_seo_titel', 'Boeken over Nijmegen') + '</h2><p>' + nbTekst('homepagina_seo', '') + '</p><p>' + nbTekst('homepagina_seo2', '') + '</p>';
  nbFixCoverHoogtes();
  setTimeout(nbFixCoverHoogtes, 300);
})();
</script>
</body>
</html>
