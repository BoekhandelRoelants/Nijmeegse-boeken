<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kunst – Boeken over Nijmegen</title>
  <meta name="description" content="Boeken over Nijmegen in de categorie Kunst. 3 titels over kunst in en rond Nijmegen.">
  <link rel="canonical" href="https://nijmeegseboeken.nl/categorie-kunst.html">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"CollectionPage","name":"Kunst – Nijmeegse Boeken","url":"https://nijmeegseboeken.nl/categorie-kunst.html"}
  </script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="nijmegen.css">
</head>
<body>
<div id="nbHeader"></div>
<main>
  <div class="nb-pagina">
    <aside class="nb-sidebar">
      <div class="nb-sidebar-blok">
        <h3>Nieuwste boeken</h3>
        <div id="nbSidebarNieuwste"></div>
      </div>
      <div class="nb-sidebar-blok">
        <h3>Categorieën</h3>
        <ul id="nbSidebarCats"></ul>
      </div>
    </aside>
    <div class="nb-hoofd">
      <nav class="nb-breadcrumb" aria-label="Kruimelpad">
        <a href="index.html">Nijmeegse Boeken</a> &rsaquo; <span>Kunst</span>
      </nav>
      <div class="nb-paginakop">
        <h1>Boeken over Nijmegen: Kunst</h1>
        <p id="paginaOndertitel">3 titels in deze categorie</p>
      </div>
      <div class="nb-grid" id="gridCategorie"><p class="nb-leeg">Laden…</p></div>
      <div class="nb-seo">
        <h2>Kunst in en rond Nijmegen</h2>
        <p>Ontdek ons aanbod boeken in de categorie kunst. Alle titels zijn direct te bestellen via Boekhandel Roelants in Nijmegen.</p>
      </div>
    </div>
  </div>
</main>
<div id="nbFooter"></div>
<script src="nijmegen.js"></script>
<script>
(async () => {
  const boeken = await nbLaadBoeken();
  const cats = [...new Set(boeken.flatMap(b => (b.categorieën||b.categorie ? (Array.isArray(b.categorieën||b.categorie) ? (b.categorieën||b.categorie) : [b.categorieën||b.categorie]) : [])))].sort().map(s => ({naam: s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' '), slug: s}));
  document.getElementById('nbHeader').innerHTML = nbHeaderHTML('categorie-kunst.html', cats);
  document.getElementById('nbFooter').innerHTML = nbFooterHTML(cats);
  nbVulSidebar(boeken, 'kunst');
  const gefilterd = boeken.filter(b => nbInCategorie(b, 'kunst'));
  document.getElementById('paginaOndertitel').textContent = gefilterd.length + ' titel' + (gefilterd.length !== 1 ? 's' : '') + ' in deze categorie';
  document.getElementById('gridCategorie').innerHTML = gefilterd.length ? gefilterd.map(nbRenderKaart).join('') : '<p class="nb-leeg">Geen boeken in deze categorie.</p>';
  nbFixCoverHoogtes();
  setTimeout(nbFixCoverHoogtes, 300);
})();
</script>
</body>
</html>
