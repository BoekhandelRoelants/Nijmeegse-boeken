<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boeken over Wandel en natuurgidsen – Nijmeegse Boeken</title>
  <meta name="description" content="Bekijk alle boeken in de categorie Wandel en natuurgidsen over Nijmegen en de regio. Bestel direct via Boekhandel Roelants.">
  <link rel="canonical" href="https://nijmeegseboeken.nl/categorie-wandel-en-natuurgidsen.html">
  <meta property="og:title" content="Boeken over Wandel en natuurgidsen – Nijmeegse Boeken">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="nl_NL">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preload" href="nijmegen.js" as="script">
  <link rel="preconnect" href="https://wscovers1.tlsecure.com">
  <link rel="stylesheet" href="nijmegen.css">
</head>
<body>
<div id="nbHeader"></div>
<main>
  <div class="nb-pagina nb-pagina-sub">
    <div class="nb-hoofd">
      <nav class="nb-breadcrumb" aria-label="Kruimelpad">
        <a href="index.html">Nijmeegse Boeken</a> &rsaquo; <span>Wandel en natuurgidsen</span>
      </nav>
      <div class="nb-paginakop">
        <h1>Boeken over Nijmegen: Wandel en natuurgidsen</h1>
        <p id="paginaOndertitel">5 titels in deze categorie</p>
      </div>
      <div class="nb-seo" id="nbSeoBlok"></div>
      <div id="nbSorteerBalk"></div>
      <div class="nb-grid" id="gridCategorie"><p class="nb-leeg">Laden…</p></div>
      <div id="nbPaginering"></div>
    </div>
    <aside class="nb-sidebar">
      <div class="nb-sidebar-blok">
        <h3>Nieuwste boeken</h3>
        <div id="nbSidebarNieuwste"></div>
      </div>
      <div class="nb-sidebar-blok">
        <h3>Categorieën</h3>
        <ul id="nbSidebarCats"></ul>
      </div>
    </aside>
  </div>
</main>
<div id="nbFooter"></div>
<script src="nijmegen.js"></script>
<script>
(async () => {
  const boeken = await nbLaadBoeken();
  await nbLaadInstellingen();
  const cats = [...new Set(boeken.flatMap(b => (b.categorieën||b.categorie ? (Array.isArray(b.categorieën||b.categorie) ? (b.categorieën||b.categorie) : [b.categorieën||b.categorie]) : [])))].sort().map(s => ({naam: s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' '), slug: s}));
  document.getElementById('nbHeader').innerHTML = nbHeaderHTML('categorie-wandel-en-natuurgidsen.html', cats);
  document.getElementById('nbFooter').innerHTML = nbFooterHTML(cats);
  nbVulSidebar(boeken, 'wandel-en-natuurgidsen');
  const gefilterd = boeken.filter(b => nbInCategorie(b, 'wandel-en-natuurgidsen'));
  document.getElementById('paginaOndertitel').textContent = gefilterd.length + ' titel' + (gefilterd.length !== 1 ? 's' : '') + ' in deze categorie';
  const seoTitel = nbTekst('cat_wandel-en-natuurgidsen_titel', 'Wandel en natuurgidsen in en rond Nijmegen');
  const seoTekst = nbTekst('cat_wandel-en-natuurgidsen_tekst', 'Ontdek ons aanbod boeken in de categorie wandel en natuurgidsen. Alle titels zijn direct te bestellen via Boekhandel Roelants in Nijmegen.');
  const seoTekst2 = nbTekst('cat_wandel-en-natuurgidsen_tekst2', '');
  document.getElementById('nbSeoBlok').innerHTML = '<h2>' + seoTitel + '</h2><p>' + seoTekst + '</p>' + (seoTekst2 ? '<p>' + seoTekst2 + '</p>' : '');
  document.getElementById('nbSorteerBalk').innerHTML = nbSorteerBalk('id-desc');
  window.nbHerrendeer = function(methode) {
    const gesorteerd = nbSorteer(gefilterd, methode);
    window._nbPaginaBoeken = gesorteerd;
    window._nbPaginaHuidig = 1;
    nbPaginering(gesorteerd, document.getElementById('nbPaginering'), document.getElementById('gridCategorie'), 1);
  }
  window.nbGaNaarPagina = function(nr) {
    window._nbPaginaHuidig = nr;
    nbPaginering(window._nbPaginaBoeken, document.getElementById('nbPaginering'), document.getElementById('gridCategorie'), nr);
    window.scrollTo({ top: document.getElementById('gridCategorie').offsetTop - 80, behavior: 'smooth' });
  };
  nbHerrendeer('id-desc');

  // ItemList schema
  const itemList = document.createElement('script'); itemList.type = 'application/ld+json';
  itemList.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Wandel en natuurgidsenboeken over Nijmegen",
    "url": "https://nijmeegseboeken.nl/categorie-wandel-en-natuurgidsen.html",
    "numberOfItems": gefilterd.length,
    "itemListElement": gefilterd.slice(0,10).map((b, i) => ({
      "@type": "ListItem",
      "position": i + 1,
      "url": "https://nijmeegseboeken.nl/boek.html?id=" + b.id,
      "name": b.titel
    }))
  });
  document.head.appendChild(itemList);
  nbFixCoverHoogtes();
  setTimeout(nbFixCoverHoogtes, 300);
})();
</script>
</body>
</html>
